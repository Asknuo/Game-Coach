services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data   # ✅ 冒号后不要有空格
    restart: unless-stopped
  agent:
    build:
      context: ./agent
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      - redis
    volumes:
      - ./agent:/app

volumes:
  redis_data:
